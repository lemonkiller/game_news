name: Fetch and Deploy

on:
  schedule:
    - cron: '0 8,20 * * *'
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: 抓取所有数据源
        run: npm run fetch
      - name: 构建前端
        run: npm run build
      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          keep_files: false
